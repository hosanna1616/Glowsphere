<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">GlowSphere logo</title>
  <desc id="desc">Golden glowing sphere icon</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fff3c4" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#120f0a" />
  <circle cx="60" cy="60" r="34" fill="url(#core)" filter="url(#glow)" />
  <circle cx="48" cy="48" r="10" fill="#fff8dc" opacity="0.75" />
</svg>
